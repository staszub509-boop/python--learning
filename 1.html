<!DOCTYPE html1><!-- HTML5 пропис версії необхідно -->
<html><!-- пропис основи необхідно-->
    <head><!-- сюди записуемо частину яку не буде бачити користувач -->
        <meta charset = 'utf-8'><!-- описує характеристики сторінки -->
        <meta name = 'author' content = 'Stas Zub'>
        <meta name = 'description' content = 'Test page'>
        <meta name = 'keywords' content = 'HTML, Test, Page'>

        <title>WWW</title><!-- назва сторінки -->
    </head><!-- обов'язкове закривання частини коду -->
    <body><!-- сюди записуемо те що буде бачити користувач-->
        <!-- Comments --> 
        <h1><strike>Заголовок<small> 1 </small></strike></h1><!-- парний тег (заголовок) -->
        <h2> Заголовок<big> 2 </big></h2><!-- парний тег (заголовок) -->
        <h3> Заголовок 3 </h3><!-- парний тег (заголовок) -->
        <h4> Заголовок 4 </h4><!-- парний тег (заголовок) -->   
        <h5> Заголовок 5 </h5><!-- парний тег (заголовок) -->
        <h6> Заголовок 6 </h6><!-- парний тег (заголовок) -->

        <pre>function myFunction(){
     alert('Hello World');
}</pre><!-- тег для збереження форматування тексту -->
        
        <code>let a = 5;</code>

        <p>Протсо <i>текст</i></p><!-- Це абзац тексту -->
        <b><p>Протсо текст</p></b><!-- Це абзац тексту -->
        
        a<sup>2</sup><br><hr><!--<br>--це одиночний тег для переносу рядка, <hr> це тег для створення горизонтальної лінії -->
        H<sub>2</sub>O

        <abbr title='HyperText Markup Language'>HTML</abbr>

        <address>
            Stas Zub, Ukraine, Kyiv, 2024
        </address>
    </body><!-- обов'язкове закривання частини коду -->
</html><!-- обов'язкове закривання основи -->
