<!DOCTYPE html>
<html>
    <head>
        <meta charset = 'utf-8'>
        <title>Text</title>
    </head>
    <body>
        <ol start = '1' type = 'a'><!-- <ol> - разш. як пронумерований список, start='' - це порядковий номер, type='' - це тип нумерації -->
            <li>Купи молоко</li><!-- <li> - елемент списку -->
            <li>Купи хлеб</li>
            <li>Купи масло</li>
        </ol>
        
        <ul type = 'circle'><!-- <ul> - разш. як непронумерований список, до нього ми не можемо ісп - satrt='' -->
            <li>Купи молоко</li>
            <li>Купи хлеб</li>
            <li>Купи масло</li>
        </ul>
    </body>
</html>

<!-- атрибут - start='' - можна принимати тільки до <ol>-->
<!-- до опреділених тегів які підримують атрибут можна додавати безліч атрибутів -->
