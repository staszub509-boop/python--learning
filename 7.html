<!DOCTYPE html>
<html lang='ru'>
    <head>
       <meta charset = 'utf-8'><!-- описує характеристики сторінки -->
        <meta name = 'author' content = 'Stas Zub'>
        <meta name = 'description' content = 'Test page'>
        <meta name = 'keywords' content = 'HTML, Test, Page'>

        <title>tag to file</title>
        <link rel='stylesheet' href="css/main.css"><!-- тег <link> використовується для відкриття файлу css записується тільки в <head> + href записуеться тільки сюди  -->
    </head>
    <body>
        <script src="js/main.js"></script><!-- <script> використовується для відкритя файлу js записуеться як в <head> так і в <body> + src записуеться тікльки сюди  -->
        <p>Hello!</p> 
    </body>
</html>

<!-- href не можна записати в <script> так само не можна записати <src> в <link> -->
