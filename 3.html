<!DOCTYPE html>
<html lang='en'><!-- lang='en' це атрибут, який вказує на мову документа, цей атибут один який можна використовувати для <html> -->
    <head>
        <meta charset="utf-8">
        <title>Atributs</title>
    </head>
    <body>
        <p title="Some text">Some text</p><!-- title='' це атрибут, який відображає текст при наведенні курсора на елемент -->
    </body>
</html>
